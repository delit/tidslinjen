# Bygger Vite-appen och publicerar dist/ till GitHub Pages.
# Aktivera: Repo → Settings → Pages → Source: GitHub Actions
# URL: https://delit.github.io/tidslinjen/
#
# Supabase (topplista): lägg minst ett par under Settings → Secrets → Actions
#   VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY  (rekommenderat)
#   eller SUPABASE_URL + SUPABASE_ANON_KEY       (samma värden som keepalive)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build for GitHub Pages
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::error::Supabase saknas i bygget. Lägg till repository secrets VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY (eller SUPABASE_URL + SUPABASE_ANON_KEY) under Settings → Secrets and variables → Actions."
            exit 1
          fi
          if echo "$VITE_SUPABASE_ANON_KEY" | grep -q '\.supabase\.co'; then
            echo "::error::SUPABASE_ANON_KEY ser ut som en URL. Använd anon/publishable-nyckeln från Supabase Dashboard → Project Settings → API (börjar med eyJ... eller sb_publishable_)."
            exit 1
          fi
          case "$VITE_SUPABASE_ANON_KEY" in
            eyJ*|sb_publishable_*) ;;
            *)
              echo "::error::SUPABASE_ANON_KEY ogiltig. Använd anon/publishable från Supabase Dashboard → Project Settings → API."
              exit 1
              ;;
          esac
          VITE_SUPABASE_URL="${VITE_SUPABASE_URL%/}"
          VITE_SUPABASE_URL="${VITE_SUPABASE_URL%/rest/v1}"
          npm run build
        env:
          VITE_BASE_PATH: /tidslinjen/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
